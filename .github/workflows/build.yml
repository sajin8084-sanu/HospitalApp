name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Buildozer and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            openjdk-17-jdk unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install cython virtualenv buildozer

      - name: Install Android SDK
        run: |
          # Buildozer will use the system's SDK
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME
          # Installing necessary packages using sdkmanager
          # (We will rely on buildozer to trigger the install)

      - name: Build with Buildozer
        run: buildozer -v android debug
        
