name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libmpdec-dev
        pip install --user --upgrade buildozer cython virtualenv

    - name: Initialize Buildozer
      run: |
        ~/.local/bin/buildozer init
        # Modify buildozer.spec to include flask and other requirements
        sed -i 's/# requirements = python3,kivy/requirements = python3,flask,jinja2,werkzeug,itsdangerous,click/g' buildozer.spec
        sed -i 's/package.domain = org.test/package.domain = org.hospitalapp/g' buildozer.spec

    - name: Build with Buildozer
      run: ~/.local/bin/buildozer -v android debug
      
